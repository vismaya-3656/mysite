<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        .errorlist {
            color: red;
            list-style: none;
            padding: 0;
        }

        .success {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Login Page</h2>

{% if message %}
    <p class="success">{{ message }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}

    <p>
        {{ form.email.label_tag }}<br>
        {{ form.email }}
        {{ form.email.errors }}
    </p>

    <p>
        {{ form.password.label_tag }}<br>
        {{ form.password }}
        {{ form.password.errors }}
    </p>

    <button type="submit">Login</button>
</form>

</body>
</html>
