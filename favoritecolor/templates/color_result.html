<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
</head>
<body>

    <h2>
        Hello {{ name }}, your favorite color is {{ color }}!
    </h2>

    <h3>Submitted Form Data</h3>

    <ul>
        {% for key, value in form_data.items %}
            <li>{{ key }} : {{ value }}</li>
        {% endfor %}
    </ul>

    <a href="/">Back</a>

</body>
</html>
