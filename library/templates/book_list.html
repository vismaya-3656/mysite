<!DOCTYPE html>
<html>
<head>
    <title>Book List</title>
</head>
<body>

<h2>Saved Books</h2>

<ul>
    {% for book in books %}
        <li>
            {{ book.title }} - {{ book.author }}
        </li>
    {% empty %}
        <li>No books available.</li>
    {% endfor %}
</ul>

<a href="/library/">Add Another Book</a>

</body>
</html>
